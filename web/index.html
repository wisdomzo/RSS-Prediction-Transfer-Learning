<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynapseAI - 神经网络训练平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
    <style>
        /* 新增现代感优化样式（不破坏原有风格） */
        :root {
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --dark-bg: rgba(10, 10, 20, 0.85);
            --border-light: rgba(0, 255, 255, 0.15);
            --shadow-cyan: 0 0 12px rgba(0, 255, 255, 0.4);
            --transition-base: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 基础布局优化 */
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
        }

        .ai-card {
            border-radius: 16px;
            border: 1px solid var(--border-light);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), var(--shadow-cyan);
            padding: 2.5rem;
            margin: 1rem auto;
            max-width: 1500px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* 表单网格优化 */
        .form-grid {
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 1300px) {
            .form-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
            }
        }

        .form-group label {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--cyan);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 输入框现代感优化 */
        input[type="number"], select, textarea {
            border-radius: 8px;
            border: 1px solid var(--border-light);
            background: rgba(0, 20, 30, 0.6);
            height: 48px;
            padding: 0 1rem;
            font-size: 0.95rem;
            transition: var(--transition-base);
        }

        input[type="number"]:focus, select:focus, textarea:focus {
            border-color: var(--magenta);
            box-shadow: 0 0 0 2px rgba(255, 0, 255, 0.2);
            background: rgba(0, 20, 30, 0.7);
        }

        textarea {
            min-height: 120px;
            padding: 1rem;
            line-height: 1.5;
        }

        /* 标签栏优化 */
        .tabs-nav {
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .nav-btn {
            border-radius: 8px;
            padding: 0.875rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: 1px solid var(--border-light);
            background: rgba(0, 25, 35, 0.5);
            transition: var(--transition-base);
        }

        .nav-btn:hover {
            background: rgba(0, 35, 45, 0.7);
            transform: translateY(-2px);
        }

        #tab-predict:checked ~ .main-container .tabs-nav label[for="tab-predict"],
        #tab-generate:checked ~ .main-container .tabs-nav label[for="tab-generate"],
        #tab-feature:checked ~ .main-container .tabs-content .pane-feature {
            box-shadow: 0 4px 16px rgba(0, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        /* 按钮组优化 */
        .button-group {
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            border-radius: 8px;
            padding: 0.875rem 2rem;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: var(--transition-base);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 255, 0.4);
        }

        /* 进度环优化 */
        #progress-container {
            margin: 2rem 0;
        }

        .progress-ring-wrapper {
            margin-bottom: 1rem;
        }

        /* 结果容器优化 */
        #result-container {
            border-radius: 16px;
            overflow: hidden;
        }

        #map-legend {
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }

        /* 响应式优化 */
        @media (max-width: 768px) {
            .ai-card {
                padding: 1.5rem;
                margin: 0.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
                gap: 0.75rem;
            }

            button {
                width: 100%;
            }
        }

        /* Canvas 背景优化 */
        #neuralNetworkCanvas {
            filter: brightness(0.8) contrast(1.1);
        }

        /* 弹窗背后的遮罩层样式 */
        #help-modal::backdrop {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }

        /* 针对帮助按钮的微调 */
        .help-btn-glow {
            transition: var(--transition-base);
        }
        .help-btn-glow:hover {
            box-shadow: 0 0 10px var(--cyan);
            background: rgba(0, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- 神经网络背景 -->
    <canvas id="neuralNetworkCanvas"></canvas>

    <!-- 内容 -->
    <div class="content-wrapper">
        <div class="ai-card">
            <h1>RSS Prediction Model</h1>
            <p class="subtitle">転移学習に基づく次世代RSS予測モデル<br>A next-generation RSS prediction model based on Transfer Learning</p>
            
            <!-- Tab 切换控件 -->
            <input type="radio" name="main-tabs" id="tab-predict" checked>
            <input type="radio" name="main-tabs" id="tab-generate">
            <input type="radio" name="main-tabs" id="tab-feature" disabled>
            
            <div class="main-container">
                <!-- 标签导航 -->
                <div class="tabs-nav">
                    <label for="tab-predict" class="nav-btn">RSS予測</label>
                    <label for="tab-generate" class="nav-btn">モデル作成</label>
                    <label for="tab-feature" class="nav-btn">データ処理</label>
                </div>
                
                <!-- 标签内容区 -->
                <div class="tabs-content">
                    <!-- 预测标签页 -->
                    <div class="tab-pane pane-predict">
                        <form id="predict-form">
                            <div class="form-grid">
                                <!-- 模型选择 -->
                                <div class="form-group">
                                    <label for="p-model">基本モデル選択</label>
                                    <select id="p-model" name="model" onchange="handleModelChange()" required>
                                        <option value="">Choose Model</option>
                                        <option value="NICT_latest_model">汎用モデルM0（NICT信州大202604）</option>
                                        <option value="customized_model">カスタムモデル</option>
                                    </select>
                                </div>
                                
                                <!-- 数据库选择 -->
                                <div class="form-group">
                                    <label for="p-database">データベース選択</label>
                                    <select id="p-database" name="database" onchange="handleDatabaseChange()" disabled>
                                        <option value="">Choose Database</option>
                                        <option value="DB_matumotoCity">長野県松本市</option>
                                        <option value="DB_kouchi_kamishi">高知県香美市</option>
                                        <option value="DB_kouchi_shimanntoucyou">高知県四万十町</option>
                                        <option value="DB_kanagawa_yokosukashi">神奈川県横須賀市</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="p-predictDataSelect">予測データ</label>
                                    <select id="p-predictDataSelect" name="predictDataSelect" onchange="handlePredictDataChange()" disabled>
                                        <option value="">Choose Predict Data</option>
                                        <option value="predictData_map">地図から選択</option>
                                        <option value="predictData_file">CSVファイルから選択</option>
                                    </select>
                                </div>
                                
                                <!-- 地图选择按钮 -->
                                <div class="form-group" style="display: flex; align-items: flex-end;">
                                    <button type="button" id="map-btn" onclick="handleMapClick()" disabled>地図から予測エリア作成</button>
                                </div>
                                
                                <!-- 经度网格 -->
                                <div class="form-group">
                                    <label for="p-mesh-lng">メッシュ化（経度方向）</label>
                                    <input type="number" id="p-mesh-lng" name="mesh_lng" 
                                        min="1" step="1" value="30" 
                                        onblur="if(this.value < 1 || this.value === '') this.value = 1;"
                                        placeholder="正整数を入力してください" disabled>
                                </div>
                                
                                <!-- 纬度网格 -->
                                <div class="form-group">
                                    <label for="p-mesh-lat">メッシュ化（緯度方向）</label>
                                    <input type="number" id="p-mesh-lat" name="mesh_lat" 
                                        min="1" step="1" value="30" 
                                        onblur="if(this.value < 1 || this.value === '') this.value = 1;"
                                        placeholder="正整数を入力してください" disabled>
                                </div>
                                
                                <!-- 频率 -->
                                <div class="form-group">
                                    <label for="p-frequency">周波数（MH<span style="text-transform: lowercase;">z</span>）</label>
                                    <input type="number" id="p-frequency" name="frequency" 
                                        min="200" step="100" value="920" 
                                        onblur="if(this.value < 200 || this.value === '') this.value = 200;"
                                        placeholder="正整数を入力してください" disabled>
                                </div>
                                
                                <!-- SF选择 -->
                                <div class="form-group">
                                    <label for="p-SF">SF</label>
                                    <select id="p-SF" name="SF" disabled>
                                        <option value="0">None</option>
                                        <option value="5">5</option>
                                        <option value="6">6</option>
                                        <option value="7">7</option>
                                        <option value="8">8</option>
                                        <option value="9">9</option>
                                        <option value="10">10</option>
                                        <option value="11">11</option>
                                        <option value="12">12</option>
                                    </select>
                                </div>
                                
                                <!-- EIRP -->
                                <div class="form-group">
                                    <label for="p-EIRP">EIRP（<span style="text-transform: lowercase;">d</span>B<span style="text-transform: lowercase;">m</span>）</label>
                                    <input type="number" id="p-EIRP" name="EIRP" 
                                        step="1" value="20" 
                                        onblur="if(this.value === '') this.value = 20;"
                                        placeholder="値を入力してください" disabled>
                                </div>
                                
                                <!-- 固定天线经度 -->
                                <div class="form-group">
                                    <label for="p-fixAntenna_lng">固定アンテナの経度（°）</label>
                                    <input type="number" id="p-fixAntenna_lng" name="fixAntenna_lng" 
                                        step="0.01" value="137.9775489"
                                        onblur="if(this.value === '') this.value = 137.9775489;"
                                        placeholder="値を入力してください" disabled>
                                </div>
                                
                                <!-- 固定天线纬度 -->
                                <div class="form-group">
                                    <label for="p-fixAntenna_lat">固定アンテナの緯度（°）</label>
                                    <input type="number" id="p-fixAntenna_lat" name="fixAntenna_lat" 
                                        step="0.01" value="36.2508738"
                                        onblur="if(this.value === '') this.value = 36.2508738;"
                                        placeholder="値を入力してください" disabled>
                                </div>
                                
                                <!-- 固定天线高度 -->
                                <div class="form-group">
                                    <label for="p-fixAntenna_alt">固定アンテナの標高（建物含む、m）</label>
                                    <input type="number" id="p-fixAntenna_alt" name="fixAntenna_alt" 
                                        step="1" value="640.7"
                                        onblur="if(this.value === '') this.value = 640.7;"
                                        placeholder="値を入力してください" disabled>
                                </div>
                                
                                <!-- 固定天线高度（屋顶） -->
                                <div class="form-group">
                                    <label for="p-fixAntenna_height">固定アンテナの高さ（屋上まで、m）</label>
                                    <input type="number" id="p-fixAntenna_height" name="fixAntenna_height" 
                                        step="0.1" value="1.5"
                                        onblur="if(this.value === '') this.value = 1.5;"
                                        placeholder="値を入力してください" disabled>
                                </div>
                                
                                <!-- 移动天线高度 -->
                                <div class="form-group">
                                    <label for="p-moveAntenna_height">移動アンテナの高さ（地面まで、m）</label>
                                    <input type="number" id="p-moveAntenna_height" name="moveAntenna_height" 
                                        step="0.1" value="1.8"
                                        onblur="if(this.value === '') this.value = 1.8;"
                                        placeholder="値を入力してください" disabled>
                                </div>
                            </div>

                            <!-- 按钮组 -->
                            <div class="button-group">
                                <button type="reset" id="reset-btn" onclick="resetUI()">Reset</button>
                                <div>
                                    <input type="hidden" id="min-lng" name="min_lng">
                                    <input type="hidden" id="min-lat" name="min_lat">
                                    <input type="hidden" id="max-lng" name="max_lng">
                                    <input type="hidden" id="max-lat" name="max_lat">
                                    <button type="button" id="predict-btn" onclick="execute_rssPredict()" disabled>Predict</button>
                                </div>
                                <button type="button" id="result-btn" onclick="showResult()" disabled>Result</button>
                            </div>
                        </form>
                    </div>




                    <!-- 模型创建标签页 -->
                    <div class="tab-pane pane-generate">
                        <form id="model-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="m-isGenFV">特徴ベクトル作成</label>
                                    <select id="m-isGenFV" name="isGenFV" onchange="m_checkIsNeedGenFV()">
                                        <option value="yes">Yes</option>
                                        <option value="no">No</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label>既存特徴ベクトル選択</label>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <button type="button" id="select-fv-btn" class="btn-modern" onclick="handleNativeSelect('fv')" disabled>
                                            ファイルを選択
                                        </button>
                                    </div>
                                    <small id="upload-status-fv" style="display: block; margin-top: 5px; color: cyan;">未選択</small>
                                </div>

                                <div class="form-group">
                                    <label for="m-scheduler">Scheduler IP</label>
                                    <input type="text" id="m-scheduler" name="scheduler" 
                                        value=""
                                        placeholder="Scheduler IP and port"
                                    >
                                </div>
                            </div>
                            
                            <div class="form-grid">
                                <!-- 超参数 -->
                                <div class="form-group">
                                    <label>訓練用データ</label>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <button type="button" id="select-csv-btn" class="btn-modern" onclick="handleNativeSelect('csv')">
                                            ファイルを選択
                                        </button>
                                    </div>
                                    <small id="upload-status" style="display: block; margin-top: 5px; color: cyan;">未選択</small>
                                </div>

                                <div class="form-group">
                                    <label>標高データ (*.tif)</label>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <button type="button" id="select-altitude-btn" class="btn-modern" onclick="handleNativeSelect('altitude')">
                                            ファイルを選択
                                        </button>
                                    </div>
                                    <small id="upload-status-altitude" style="display: block; margin-top: 5px; color: cyan;">未選択</small>
                                </div>

                                <div class="form-group">
                                    <label>建物データ (*.gpkg)</label>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <button type="button" id="select-building-btn" class="btn-modern" onclick="handleNativeSelect('building')">
                                            ファイルを選択
                                        </button>
                                    </div>
                                    <small id="upload-status-building" style="display: block; margin-top: 5px; color: cyan;">未選択</small>
                                </div>

                                <div class="form-group">
                                    <label>土地利用データ (*.gpkg)</label>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <button type="button" id="select-landuse-btn" class="btn-modern" onclick="handleNativeSelect('landuse')">
                                            ファイルを選択
                                        </button>
                                    </div>
                                    <small id="upload-status-landuse" style="display: block; margin-top: 5px; color: cyan;">未選択</small>
                                </div>
                            </div>

                            <div class="form-grid">
                                <!-- 频率 -->
                                <div class="form-group">
                                    <label for="m-frequency">周波数（MH<span style="text-transform: lowercase;">z</span>）</label>
                                    <input type="number" id="m-frequency" name="frequency" 
                                        min="200" step="100" value="920" 
                                        onblur="if(this.value < 200 || this.value === '') this.value = 200;"
                                        placeholder="正整数を入力してください"
                                        onchange="m_checkInputs()">
                                </div>

                                <!-- SF选择 -->
                                <div class="form-group">
                                    <label for="m-SF">SF</label>
                                    <select id="m-SF" name="SF" onchange="m_checkInputs()">
                                        <option value="0">None</option>
                                        <option value="5">5</option>
                                        <option value="6">6</option>
                                        <option value="7">7</option>
                                        <option value="8">8</option>
                                        <option value="9">9</option>
                                        <option value="10">10</option>
                                        <option value="11">11</option>
                                        <option value="12">12</option>
                                    </select>
                                </div>
                                
                                <!-- EIRP -->
                                <div class="form-group">
                                    <label for="m-EIRP">EIRP（<span style="text-transform: lowercase;">d</span>B<span style="text-transform: lowercase;">m</span>）</label>
                                    <input type="number" id="m-EIRP" name="EIRP" 
                                        step="1" value="20" 
                                        onblur="if(this.value === '') this.value = 20;"
                                        placeholder="値を入力してください"
                                        onchange="m_checkInputs()">
                                </div>

                                <!-- 固定天线经度 -->
                                <div class="form-group">
                                    <label for="m-fixAntenna_lng">固定アンテナの経度（°）</label>
                                    <input type="number" id="m-fixAntenna_lng" name="fixAntenna_lng" 
                                        step="0.01" value="137.9775489"
                                        onblur="if(this.value === '') this.value = 137.9775489;"
                                        placeholder="値を入力してください"
                                        onchange="m_checkInputs()">
                                </div>
                                
                                <!-- 固定天线纬度 -->
                                <div class="form-group">
                                    <label for="m-fixAntenna_lat">固定アンテナの緯度（°）</label>
                                    <input type="number" id="m-fixAntenna_lat" name="fixAntenna_lat" 
                                        step="0.01" value="36.2508738"
                                        onblur="if(this.value === '') this.value = 36.2508738;"
                                        placeholder="値を入力してください"
                                        onchange="m_checkInputs()">
                                </div>
                                
                                <!-- 固定天线高度 -->
                                <div class="form-group">
                                    <label for="m-fixAntenna_alt">固定アンテナの高度（建物含む、m）</label>
                                    <input type="number" id="m-fixAntenna_alt" name="fixAntenna_alt" 
                                        step="1" value="640.7"
                                        onblur="if(this.value === '') this.value = 640.7;"
                                        placeholder="値を入力してください"
                                        onchange="m_checkInputs()">
                                </div>
                                
                                <!-- 固定天线高度（屋顶） -->
                                <div class="form-group">
                                    <label for="m-fixAntenna_height">固定アンテナの高さ（屋上まで、m）</label>
                                    <input type="number" id="m-fixAntenna_height" name="fixAntenna_height" 
                                        step="0.1" value="1.5"
                                        onblur="if(this.value === '') this.value = 1.5;"
                                        placeholder="値を入力してください"
                                        onchange="m_checkInputs()">
                                </div>
                                
                                <!-- 移动天线高度 -->
                                <div class="form-group">
                                    <label for="m-moveAntenna_height">移動アンテナの高さ（地面まで、m）</label>
                                    <input type="number" id="m-moveAntenna_height" name="moveAntenna_height" 
                                        step="0.1" value="1.8"
                                        onblur="if(this.value === '') this.value = 1.8;"
                                        placeholder="値を入力してください"
                                        onchange="m_checkInputs()">
                                </div>
                            </div>

                            <div class="form-grid">
                                <!-- 模型选择 -->
                                <div class="form-group">
                                    <label for="m-model">基本モデル選択</label>
                                    <select id="m-model" name="m-model" onchange="m_handleModelChange()" required disabled>
                                        <option value="noModel">新規モデル</option>
                                        <option value="NICT_latest_model">汎用モデルM0（NICT信州大202604）</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="m-numCore1">畳み込みカーネル数</label>
                                    <select id="m-numCore1" name="numCore1" disabled>
                                        <option value="2">2</option>
                                        <option value="4">4</option>
                                        <option value="8">8</option>
                                        <option value="16">16</option>
                                        <option value="32">32</option>
                                        <option value="64">64</option>
                                        <option value="128">128</option>
                                        <option value="256">256</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="m-learningType">学習タイプ</label>
                                    <select id="m-learningType" name="learningType" disabled>
                                        <option value="type_None">None</option>
                                        <option value="type_TL">Transfer Learning</option>
                                        <option value="type_IT">Incremental Training</option>
                                    </select>
                                </div>

                            </div>

                            <div style="margin: 10px 0; text-align: right;">
                                <button type="button" onclick="loadAndShowPdf()" style="background: transparent; color: var(--cyan); border: 1px solid var(--cyan); padding: 5px 15px; font-size: 0.8rem; cursor: pointer; border-radius: 4px;">
                                    <i class="fas fa-book"></i> Fine-Tuningの説明

        let selectedPaths = {

        // ファイル選択用の関数
        async function handleNativeSelect(type) {
            try {
                const paths = await window.pywebview.api.select_files_native(type);
                if (paths && paths.length > 0) {
                    selectedPaths[type] = paths;

                    const label = document.getElementById(statusId);
                    if (label) {

                    }

                }
            } catch (err) {
                console.error("文件选择失败:", err);
            }
        }

        // --- 神经网络可视化逻辑 ---
        const canvas = document.getElementById('neuralNetworkCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        let connections = [];
        const NODE_COUNT = 150;
        const MAX_CONNECTION_DISTANCE = 120;

        class Node {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 1;
                this.brightness = Math.random(); // 用于闪烁效果
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                // 更新亮度以产生微弱的脉动效果
                this.brightness += (Math.random() - 0.5) * 0.02;
                this.brightness = Math.max(0.2, Math.min(1, this.brightness));
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3
                );
                // 渐变从中心的亮青色/洋红到外圈的透明
                gradient.addColorStop(0, `hsla(${Math.sin(Date.now()/1000) * 60 + 180}, 100%, 80%, ${this.brightness})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            nodes = [];
            for (let i = 0; i < NODE_COUNT; i++) {
                nodes.push(new Node());
            }
        }

        function connectNodes() {
            connections = [];
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < MAX_CONNECTION_DISTANCE) {
                        connections.push({
                            source: nodes[i],
                            target: nodes[j],
                            strength: 1 - distance / MAX_CONNECTION_DISTANCE
                        });
                    }
                }
            }
        }

        function render() {
            // 半透明覆盖层实现运动模糊效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新并绘制连接线
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 0.5;
            for (const conn of connections) {
                ctx.beginPath();
                ctx.moveTo(conn.source.x, conn.source.y);
                ctx.lineTo(conn.target.x, conn.target.y);
                ctx.stroke();
            }

            // 更新并绘制节点
            for (const node of nodes) {
                node.update();
                node.draw(ctx);
            }
        }

        function animate() {
            connectNodes(); // 每帧都重新计算连接，以适应节点移动
            render();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
        document.querySelectorAll('#predict-form input, #predict-form select').forEach(element => {
            element.addEventListener('input', checkInputs);
            element.addEventListener('change', checkInputs);
            element.addEventListener('input', m_checkInputs);
            element.addEventListener('change', m_checkInputs);
        });

        // --- 表单提交 ---
        document.getElementById('nnForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            alert('神经网络启动指令已发出！请监控后台日志。');
        });
    </script>

        // 修改你原有的 openMap 函数，支持传入中心点坐标
        function openMap(centerCoords, zoomLevel, limitArea) {
            if (event) event.preventDefault();

            const modal = document.createElement('div');
            modal.id = 'map-modal';
            Object.assign(modal.style, {
                position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh',
                backgroundColor: 'white', zIndex: '10000', display: 'flex', flexDirection: 'column'
            });

            modal.innerHTML = `
                <div style="padding: 15px 25px; background: #222; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid cyan;">
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-family: 'Orbitron', sans-serif; font-size: 16px; color: #00ffcc;">予測エリア選択</span>
                        <div id="coord-display" style="font-size: 12px; color: #aaa; margin-top: 4px;">Waiting for area selection...</div>
                    </div>
                    <button type="button" id="close-map-btn" style="background: #00ffcc; color: #222; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold;">完成</button>
                </div>
                <div id="map-canvas" style="flex: 1; width: 100%; height: 100%;"></div>
            `;
            document.body.appendChild(modal);

            const map = L.map('map-canvas', {
                center: centerCoords,
                zoom: zoomLevel,
                minZoom: limitArea ? zoomLevel : 1,
            });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            if (limitArea) {
                setTimeout(() => {
                    map.invalidateSize();
                    const initialBounds = map.getBounds();
                    map.setMaxBounds(initialBounds);
                }, 100);
            } else {
                setTimeout(() => { map.invalidateSize(); }, 100);
            }

            const drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);

            const drawControl = new L.Control.Draw({
                draw: { rectangle: true, polyline: false, circle: false, marker: false, polygon: false, circlemarker: false },
                edit: { featureGroup: drawnItems } // 允许编辑已画好的图形
            });
            map.addControl(drawControl);

            // --- 提取坐标的公共函数 ---
            function updateCoordinates() {
                if (drawnItems.getLayers().length === 0) return;
                
                const layer = drawnItems.getLayers()[0];
                const bounds = layer.getBounds();
                const sw = bounds.getSouthWest();
                const ne = bounds.getNorthEast();

                // 格式化数据
                const coords = {
                    minLng: sw.lng.toFixed(6),
                    minLat: sw.lat.toFixed(6),
                    maxLng: ne.lng.toFixed(6),
                    maxLat: ne.lat.toFixed(6)
                };

                document.getElementById('coord-display').innerText = 
                    `Min: ${coords.minLng}, ${coords.minLat} | Max: ${coords.maxLng}, ${coords.maxLat}`;

                // 将值传递给隐藏的 input 标签
                document.getElementById('min-lng').value = coords.minLng;
                document.getElementById('min-lat').value = coords.minLat;
                document.getElementById('max-lng').value = coords.maxLng;
                document.getElementById('max-lat').value = coords.maxLat;
                
                return coords;
            }

            // A. 监听创建事件
            map.on(L.Draw.Event.CREATED, function (e) {
                drawnItems.clearLayers();
                drawnItems.addLayer(e.layer);
                updateCoordinates();
            });

            // B. 监听编辑事件 (实时刷新核心)
            map.on(L.Draw.Event.EDITED, function (e) {
                updateCoordinates();
            });

            // C. 监听删除事件
            map.on(L.Draw.Event.DELETED, function (e) {
                document.getElementById('min-lng').value = "";
                document.getElementById('min-lat').value = "";
                document.getElementById('max-lng').value = "";
                document.getElementById('max-lat').value = "";
                document.getElementById('coord-display').innerText = "選択エリアがクリアされました。再度選択してください。";
            });

            document.getElementById('close-map-btn').onclick = () => {
                const finalCoords = updateCoordinates();
                console.log("最终确定的坐标:", finalCoords);
                document.body.removeChild(modal);
                document.getElementById('map-btn').disabled = true;
                document.getElementById('p-mesh-lng').disabled = false;
                document.getElementById('p-mesh-lat').disabled = false;
                document.getElementById('p-frequency').disabled = false;
                document.getElementById('p-SF').disabled = false;
                document.getElementById('p-EIRP').disabled = false;
                document.getElementById('p-fixAntenna_lng').disabled = false;
                document.getElementById('p-fixAntenna_lat').disabled = false;
                document.getElementById('p-fixAntenna_alt').disabled = false;
                document.getElementById('p-fixAntenna_height').disabled = false;
                document.getElementById('p-moveAntenna_height').disabled = false;
                checkInputs();
            };
        }

        function updateProgress(percent, status) {
            const container = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            const progressStatus = document.getElementById('progress-status');

            // 1. 显示容器
            container.style.display = 'block';
            
            // 2. 计算偏移量 (假设 r=50, 周长 C = 2 * π * 50 ≈ 314)
            const circumference = 314; 
            const offset = circumference - (percent / 100 * circumference);
            
            // 3. 应用样式
            progressBar.style.strokeDashoffset = offset;
            
            // 4. 更新文字
            progressPercent.innerText = `${percent}%`;
            progressStatus.innerText = status;

            // 5. 100% 时的特殊处理
            const resultBtn = document.getElementById('result-btn');
            if (percent >= 100) {
                progressBar.style.stroke = "#00ffcc"; // 变绿表示完成
                progressStatus.innerText = "完了";
                resultBtn.disabled = false;
                resultBtn.style.backgroundColor = "#00ffcc";
                resultBtn.style.boxShadow = "0 0 15px #00ffcc";
                document.getElementById('reset-btn').disabled = false;
                document.getElementById('m-reset-btn').disabled = false;
            } else if (percent === -1) {
                progressBar.style.stroke = "#ff4444"; // 错误时显示红色
                progressStatus.innerText = "エラー";
                resultBtn.disabled = false;
                resultBtn.style.backgroundColor = "#00ffcc";
                resultBtn.style.boxShadow = "0 0 15px #00ffcc";
                document.getElementById('reset-btn').disabled = false;
                document.getElementById('m-reset-btn').disabled = false;
            } else {
                progressBar.style.stroke = "cyan";    // 进行中保持青色
            }
        }

        let resultMap = null;

        async function showResult() {
            const rawData = await window.pywebview.api.get_prediction_data();
            if (!rawData || rawData.length === 0) return;

            // 1. 动态获取极值
            const values = rawData.map(p => p.Predicted_Value);
            const dataMin = Math.min(...values);
            const dataMax = Math.max(...values);
            const dataMid = (dataMin + dataMax) / 2;

            // 2. 更新图例上的文字
            document.getElementById('legend-max').innerText = dataMax.toFixed(1);
            document.getElementById('legend-mid').innerText = dataMid.toFixed(1);
            document.getElementById('legend-min').innerText = dataMin.toFixed(1);

            // 3. 动态获取网格规模
            const sizeLng = parseInt(document.getElementById('p-mesh-lng').value) || 30;
            const sizeLat = parseInt(document.getElementById('p-mesh-lat').value) || 30;

            // 4. 地图初始化...
            document.getElementById('result-container').style.display = 'flex';
            if (resultMap) resultMap.remove();
            resultMap = L.map('result-map', { preferCanvas: true }).setView([rawData[0].Latitude, rawData[0].Longitude], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(resultMap);

            const predictMode = document.getElementById('p-predictDataSelect').value;
            if (predictMode === "predictData_file") {
                // 仅画点：遍历所有原始数据并在地图上打点
                rawData.forEach(p => {
                    const color = getMatlabColormap(p.Predicted_Value, dataMin, dataMax);
                    L.circleMarker([p.Latitude, p.Longitude], {
                        radius: 5,           // 点的大小
                        fillColor: color,    // 根据 RSS 值着色
                        color: "#000",       // 轮廓颜色
                        weight: 0.5,         // 轮廓粗细
                        opacity: 1,
                        fillOpacity: 0.8
                    })
                    .bindPopup(`RSS: ${p.Predicted_Value.toFixed(2)} dBm<br>Lat: ${p.Latitude}<br>Lon: ${p.Longitude}`)
                    .addTo(resultMap);
                });
                // 如果是纯画点模式，直接结束函数，不执行后面的网格排序和绘图逻辑
                return; 
            }

            // 5. 排序数据...
            const sortedData = [...rawData].sort((a, b) => {
                if (Math.abs(a.Latitude - b.Latitude) > 0.0000001) return a.Latitude - b.Latitude;
                return a.Longitude - b.Longitude;
            });

            // 6. 绘图循环...
            for (let i = 0; i < sizeLat - 1; i++) {
                for (let j = 0; j < sizeLng - 1; j++) {
                    const idx_bl = i * sizeLng + j;
                    const idx_br = i * sizeLng + (j + 1);
                    const idx_tr = (i + 1) * sizeLng + (j + 1);
                    const idx_tl = (i + 1) * sizeLng + j;

                    const p1 = sortedData[idx_bl];
                    const p2 = sortedData[idx_br];
                    const p3 = sortedData[idx_tr];
                    const p4 = sortedData[idx_tl];

                    if (!p1 || !p2 || !p3 || !p4) continue;

                    const avgVal = (p1.Predicted_Value + p2.Predicted_Value + p3.Predicted_Value + p4.Predicted_Value) / 4;
                    
                    // 使用动态范围着色
                    const color = getMatlabColormap(avgVal, dataMin, dataMax);

                    L.polygon([
                        [p1.Latitude, p1.Longitude], [p2.Latitude, p2.Longitude],
                        [p3.Latitude, p3.Longitude], [p4.Latitude, p4.Longitude]
                    ], {
                        stroke: false,
                        fillColor: color,
                        fillOpacity: 0.7,
                        smoothFactor: 0
                    }).bindPopup(`Avg RSS: ${avgVal.toFixed(2)} dBm`).addTo(resultMap);
                }
            }
        }

        // 模拟 MATLAB 的 Jet/Turbo Colormap
        function getMatlabColormap(rss, dynamicMin, dynamicMax) {
            // 归一化：将当前值映射到 0 (蓝) - 1 (红)
            let v = (rss - dynamicMin) / (dynamicMax - dynamicMin);
            v = Math.max(0, Math.min(1, v));

            if (v < 0.25) return `rgb(0, ${Math.floor(v*4*255)}, 255)`;
            if (v < 0.5)  return `rgb(0, 255, ${Math.floor((0.5-v)*4*255)})`;
            if (v < 0.75) return `rgb(${Math.floor((v-0.5)*4*255)}, 255, 0)`;
            return `rgb(255, ${Math.floor((1-v)*4*255)}, 0)`;
        }

        async function uploadTransferData() {
            // 基础 UI 禁用
            document.getElementById('tab-predict').disabled = true;

            document.getElementById('m-isGenFV').disabled = true;
            const uploadBtn = document.getElementById('upload-confirm-btn');
            uploadBtn.disabled = true;
            setFormDisabledforMpanal(true);

            // 获取坐标
            const coords = {
                frequency: document.getElementById('m-frequency').value,
                SF: document.getElementById('m-SF').value,
                EIRP: document.getElementById('m-EIRP').value,
                fixAntenna_lng: document.getElementById('m-fixAntenna_lng').value,
                fixAntenna_lat: document.getElementById('m-fixAntenna_lat').value,
                fixAntenna_alt: document.getElementById('m-fixAntenna_alt').value,
                fixAntenna_height: document.getElementById('m-fixAntenna_height').value,
                moveAntenna_height: document.getElementById('m-moveAntenna_height').value,
            };

            // 检查路径变量 (selectedPaths 必须在全局定义)
            if (selectedPaths.csv.length === 0 || selectedPaths.altitude.length === 0) {
                alert("文件未选择！");
                uploadBtn.disabled = false;
                document.getElementById('m-reset-btn').disabled = false;
                return;
            }

            try {
                // 调用 Python 接口
                const result = await window.pywebview.api.upload_csv_files(
                    selectedPaths.csv,
                    selectedPaths.altitude,
                    selectedPaths.building,
                    selectedPaths.landuse
                );

                if (result.status === "success") {
                    // 继续后续处理
                    let result_DP = await window.pywebview.api.executeDataProcessing(coords);
                    if (result_DP.user_choice) {
                        setFormDisabledforMpanal(false, true);
                    } else if (result_DP.user_choice === false) {
                        document.getElementById('generate-btn').disabled = false;
                        document.getElementById('m-model').disabled = false;
                    } else {
                        alert("データ処理中にエラーが発生しました。");
                    }
                    document.getElementById('m-reset-btn').disabled = false;
                } else {
                    alert("错误: " + result.message);
                }
            } catch (error) {
                console.error(error);
            } finally {
                document.getElementById('m-reset-btn').disabled = false;
            }
        }


        function updateTerminal(message) {
            const terminal = document.getElementById('terminal-box');
            const content = document.getElementById('terminal-content');
            if (!terminal || !content) return;

            // 1. 创建行容器
            const newLine = document.createElement('div');
            newLine.style.marginBottom = '2px';
            newLine.style.whiteSpace = 'pre-wrap'; // 保持插件输出的空格
            newLine.style.wordBreak = 'break-all'; // 强制换行防止横向滚动

            // 2. 时间戳部分
            const now = new Date();
            const timeStr = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}] `;
            
            const timeSpan = document.createElement('span');
            timeSpan.style.color = '#888';
            timeSpan.innerText = timeStr;

            // 3. 消息内容部分 (安全处理)
            const msgSpan = document.createElement('span');
            msgSpan.style.color = '#00ffcc'; // 使用你 UI 中的青色
            msgSpan.innerText = message;

            // 4. 组装并添加
            newLine.appendChild(timeSpan);
            newLine.appendChild(msgSpan);
            content.appendChild(newLine);

            // 5. 性能管理：保留 300 行
            if (content.children.length > 300) {
                content.removeChild(content.firstChild);
            }

            // 6. 自动滚动
            terminal.scrollTop = terminal.scrollHeight;
        }
